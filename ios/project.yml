name: BaseHaptic
options:
  bundleIdPrefix: com.basehaptic
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    minorVersion: 2.5.1

targets:
  BaseHaptic:
    type: application
    platform: iOS
    sources:
      - path: mobile/BaseHaptic
      - path: shared/BaseHapticShared
    settings:
      base:
        INFOPLIST_FILE: mobile/BaseHaptic/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.basehaptic.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: BaseHapticWatch Watch App
      - target: BaseHapticLiveActivity
      - package: supabase-swift
        product: Supabase

  BaseHapticWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: watch/BaseHapticWatch
    settings:
      base:
        INFOPLIST_FILE: watch/BaseHapticWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.basehaptic.app.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_WATCH_COMPANION: "YES"

  BaseHapticLiveActivity:
    type: appExtension
    platform: iOS
    sources:
      - path: liveactivity/BaseHapticLiveActivity
      - path: shared/BaseHapticShared
      - path: mobile/BaseHaptic/Models/Team.swift
      - path: mobile/BaseHaptic/Theme/Colors.swift
    settings:
      base:
        INFOPLIST_FILE: liveactivity/BaseHapticLiveActivity/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.basehaptic.app.liveactivity
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
