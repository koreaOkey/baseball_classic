name: BaseHaptic
options:
  bundleIdPrefix: com.basehaptic
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    minorVersion: 2.5.1
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    majorVersion: 13.2.0

targets:
  BaseHaptic:
    type: application
    platform: iOS
    sources:
      - path: mobile/BaseHaptic
      - path: shared/BaseHapticShared
    settings:
      base:
        INFOPLIST_FILE: mobile/BaseHaptic/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.basehaptic.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: BaseHaptic.entitlements
        DEVELOPMENT_TEAM: 8G4LG3694Q
    dependencies:
      - target: BaseHapticWatch Watch App
      - package: supabase-swift
        product: Supabase
      - package: GoogleMobileAds
        product: GoogleMobileAds

  BaseHapticWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: watch/BaseHapticWatch
    settings:
      base:
        INFOPLIST_FILE: watch/BaseHapticWatch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.basehaptic.app.watchkitapp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_WATCH_COMPANION: "YES"
        CODE_SIGN_ENTITLEMENTS: "BaseHapticWatch Watch App.entitlements"
        DEVELOPMENT_TEAM: 8G4LG3694Q

# BaseHapticLiveActivity 타겟은 현재 비활성.
# 원본 pbxproj에 네이티브 타겟으로 등록된 적이 없고 소스 파일은 dead code 상태.
# 추후 LiveActivity 위젯을 실제로 활성화할 때 별도 change로 다시 추가한다.
# liveactivity/BaseHapticLiveActivity/ 의 Widget 코드는 유지되지만 컴파일되지 않는다.
